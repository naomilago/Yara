steps:
  # 1. Build Backend Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yara-api', './backend']

  # 2. Push Backend Image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/yara-api']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'yara-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yara-api'
      - '--region'
      - 'southamerica-east1'
      - '--allow-unauthenticated'
      - '--set-secrets=GROQ_API_KEY=groq-api-key:latest,WHATSAPP_TOKEN=whatsapp-token:latest,WHATSAPP_PHONE_ID=whatsapp-phone-id:latest,WHATSAPP_VERIFY_TOKEN=whatsapp-verify-token:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest,ELEVENLABS_VOICE_ID=elevenlabs-voice-id:latest'

  # 4. Build Frontend
  - name: 'node:20'
    entrypoint: npm
    dir: 'frontend'
    args: ['install']

  - name: 'node:20'
    entrypoint: npm
    dir: 'frontend'
    args: ['run', 'build']
    env:
      - 'VITE_API_URL=https://yara-api-xxxxxxx-rj.a.run.app' # Substitua pela URL real após o primeiro deploy
