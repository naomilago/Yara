steps:
  # 1. Build Unified Docker Image (Frontend + Backend)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/yara-api', '.']

  # 2. Push Image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/yara-api']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'yara-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/yara-api'
      - '--region'
      - 'southamerica-east1'
      - '--allow-unauthenticated'
      - '--set-secrets=GROQ_API_KEY=groq-api-key:latest,GROQ_WHISPER_MODEL=groq-whisper-model:latest,WHATSAPP_TOKEN=whatsapp-token:latest,WHATSAPP_PHONE_ID=whatsapp-phone-id:latest,WHATSAPP_VERIFY_TOKEN=whatsapp-verify-token:latest,ELEVENLABS_API_KEY=elevenlabs-api-key:latest,ELEVENLABS_VOICE_ID=elevenlabs-voice-id:latest'


